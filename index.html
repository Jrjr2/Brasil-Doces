<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="icon" type="image/png" sizes="512x512" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#ff85a2">
    <meta name="theme-color" content="#ff85a2">

    <title>Brasil Doces®</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --bg: #fff0f3; --card: #ffffff; --primary: #ff85a2; --accent: #d63384; 
            --text: #4a4a4a; --danger: #e74c3c; --border: #ffd1dc; --success: #2ecc71;
            --brown: #6d4c41; --info: #3498db;
        }

        body.dark-mode {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --border: #333333;
            --primary: #ffb1c1; --accent: #ff85a2; --brown: #ffdadf; --success: #4cd137;
        }

        body.dark-mode .zn-brand-text { color: var(--primary); }
        body.dark-mode .price-tag { color: var(--primary); }
        body.dark-mode .dash-val { color: var(--primary); }
        body.dark-mode input { background: #252525; border-color: #444; }
        body.dark-mode .btn-action { background: #2a2a2a; color: var(--primary); border-color: var(--border); }
        body.dark-mode .zn-slogan { color: #b5a1a1; }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; transition: background 0.3s, color 0.3s; }
        
        #authContainer { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; width: 100%; background-color: var(--bg); padding: 20px; box-sizing: border-box; }
        .login-logo { width: 220px; height: auto; display: block; margin: 0 auto -25px auto; mix-blend-mode: multiply; position: relative; z-index: 10; }
        .login-card { background: var(--card); padding: 30px; border-radius: 24px; width: 100%; max-width: 320px; box-shadow: 0 10px 30px rgba(214, 51, 132, 0.1); border: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }

        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .zn-brand-container { display: flex; align-items: center; gap: 12px; }
        .zn-column-titles { display: flex; flex-direction: column; justify-content: center; }
        .zn-brand-text { font-family: 'Pacifico', cursive; font-size: 1.6em; color: var(--brown); margin: 0; line-height: 1.1; }
        .zn-slogan { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: #8e736b; margin-top: -2px; }
        
        .header-actions { display: flex; gap: 8px; align-items: center; }
        .btn-logout { background: white; border: 1px solid var(--danger); color: var(--danger); padding: 8px 15px; border-radius: 10px; font-size: 12px; width: auto; margin: 0; font-weight: 700; }
        .btn-theme { background: var(--card); border: 1px solid var(--border); color: var(--accent); width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .dash-box { background: var(--card); padding: 15px; border-radius: 16px; text-align: center; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .dash-label { font-size: 10px; color: #999; text-transform: uppercase; display: block; margin-bottom: 5px; font-weight: 700; }
        .dash-val { font-size: 1.2em; font-weight: 800; color: var(--accent); }

        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 18px; border: 1px solid var(--border); border-left: 5px solid var(--primary); position: relative; box-shadow: 0 6px 20px rgba(0,0,0,0.05); }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .price-tag { color: var(--brown); font-size: 1.8em; font-weight: 900; margin-bottom: 12px; display: block; }

        input { width: 100%; padding: 14px; margin: 6px 0; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); box-sizing: border-box; font-size: 16px; outline: none; }
        button { padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; }
        .btn-main { background: var(--accent); color: white; transition: 0.3s; }
        .btn-action { background: var(--card); color: var(--brown); border: 1px solid var(--border); }
        .btn-zap { background: #25D366; color: white; }
        
        .btn-delete { color: #ddd; background: transparent; width: auto !important; margin: 0 !important; padding: 5px; }
        .btn-edit { color: var(--info); background: transparent; width: auto !important; margin: 0 !important; padding: 5px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; padding: 20px; box-sizing: border-box; backdrop-filter: blur(4px); }
        .modal-content { background: var(--card); border-radius: 24px; padding: 25px; max-width: 420px; margin: auto; max-height: 85vh; overflow-y: auto; color: var(--text); border: 1px solid var(--border); }
        
        #nomeClienteModal, #nomeClienteResumo { color: var(--text) !important; text-align: center; font-weight: 800 !important; font-size: 1.5em !important; margin-bottom: 15px; text-transform: uppercase; border-bottom: 2px solid var(--border); padding-bottom: 10px; display: block; }
        .modal-section-title { font-weight: 800; font-size: 11px; color: #999; text-transform: uppercase; margin: 15px 0 10px 5px; display: block; letter-spacing: 0.5px; }

        .item-selecionavel { display: flex; align-items: center; gap: 12px; padding: 12px 8px; border-bottom: 1px solid var(--border); cursor: pointer; border-radius: 10px; transition: background 0.2s; }
        .item-detalhe { flex: 1; display: flex; justify-content: space-between; align-items: center; font-size: 0.95em; }
        .chk-item { width: 18px; height: 18px; flex-shrink: 0; margin: 0; cursor: pointer; }

        .extrato-container { 
            background: var(--card); 
            border: 1px dashed var(--border); 
            border-radius: 12px; 
            padding: 15px; 
            font-family: 'Inter', sans-serif; 
            font-size: 0.9em; 
            color: var(--text); 
        }

        .extrato-header {
            display: grid;
            grid-template-columns: 45px 35px 1fr 70px;
            gap: 5px;
            font-weight: 800;
            font-size: 10px;
            text-transform: uppercase;
            color: #999;
            border-bottom: 2px solid var(--border);
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        .extrato-item {
            display: grid;
            grid-template-columns: 45px 35px 1fr 70px;
            gap: 5px;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            align-items: center;
        }

        .extrato-item .qtd { font-weight: 700; color: var(--accent); text-align: center; }
        .extrato-item .valor { text-align: right; font-weight: 700; color: var(--success); }

        #containerSoma { background: var(--bg); padding: 15px; border-radius: 16px; margin-top: 15px; border: 1px solid var(--border); display: none; }

        @media print {
            body * { visibility: hidden; }
            #modalResumo, #modalResumo * { visibility: visible; }
            #modalResumo { position: absolute; left: 0; top: 0; width: 100%; height: auto; background: white; }
            .modal-content { max-height: none !important; overflow: visible !important; border: none !important; width: 100% !important; box-shadow: none !important; padding: 0 !important; margin: 0 !important; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

<div id="authContainer">
    <img src="logo.png" alt="Brasil Doces" class="login-logo">
    <div class="login-card">
        <input type="email" id="loginEmail" placeholder="E-mail">
        <input type="password" id="loginPassword" placeholder="Senha">
        <button id="btnLogin" class="btn-main">ACESSAR SISTEMA</button>
    </div>
</div>

<div id="mainContainer" style="display:none; max-width:480px; margin:auto;">
    <div class="header-top">
        <div class="zn-brand-container">
            <div class="zn-column-titles">
                <h1 class="zn-brand-text">Brasil Doces</h1>
                <span class="zn-slogan">Feito com amor ♡</span>
            </div>
        </div>
        <div class="header-actions">
            <button onclick="window.location.reload()" class="btn-theme" title="Atualizar">
                <i class="fa-solid fa-rotate"></i>
            </button>
            <button class="btn-theme" onclick="toggleTheme()" id="themeBtn" title="Alternar Tema">
                <i class="fa-solid fa-moon"></i>
            </button>
            <button onclick="sair()" class="btn-logout">SAIR</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="dash-box"><span class="dash-label">PEDIDOS HOJE</span><div class="dash-val" id="totalHoje">R$ 0,00</div></div>
        <div class="dash-box"><span class="dash-label">SALDO CLIENTES</span><div class="dash-val" id="totalGeral">R$ 0,00</div></div>
    </div>

    <div class="card" style="border-top: 3px solid var(--accent); border-left: none;">
        <div id="tituloFormCliente" style="font-weight: 800; margin-bottom: 10px; color: var(--brown);">CADASTRAR NOVO CLIENTE</div>
        <input type="text" id="novoNome" placeholder="Nome Completo">
        <input type="tel" id="novoTel" placeholder="WhatsApp">
        <input type="text" id="novoNiver" placeholder="Data Aniversário (Ex: 15/04)" maxlength="5" oninput="mascaraData(this)">
        <input type="number" id="novoLimite" placeholder="Limite de Crédito" value="1000">
        <button id="btnCadastrar" class="btn-main">ADICIONAR CLIENTE</button>
    </div>

    <input type="text" id="buscaCliente" placeholder="🔍 Procurar por nome..." onkeyup="render()">
    <div id="lista"></div>
</div>

<div id="modalHistorico" class="modal">
    <div class="modal-content">
        <h3 id="nomeClienteModal"></h3>
        <span class="modal-section-title">Itens Pendentes</span>
        <div id="listaItensModal"></div>
        <div id="containerSoma">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 12px; font-weight: bold; color: var(--brown);">TOTAL SELECIONADO:</span>
                <span id="txtSoma" style="font-size: 18px; font-weight: 800; color: var(--accent);">R$ 0,00</span>
            </div>
            <button id="btnPagarSelecionados" class="btn-main" style="margin-top: 10px; background: var(--success);" onclick="processarPagamento(clienteAbertoId)">
                <i class="fa-solid fa-check-double"></i> PAGAR SELECIONADOS
            </button>
        </div>
        <div style="margin-top:20px; display:flex; flex-direction:column; gap:10px;">
            <button id="btnZapRapido" class="btn-zap"><i class="fa-brands fa-whatsapp"></i> INFORMAR CONSUMO</button>
            
            <button id="btnPixZap" class="btn-zap" style="background:#3498db;">
                <i class="fa-solid fa-paper-plane"></i> COBRAR COM PIX
            </button>

            <button id="btnFechamentoMensal" class="btn-action" style="background:var(--bg); border:1px solid var(--primary);">
                <i class="fa-solid fa-calendar-check"></i> RESUMO MENSAL
            </button>
            
            <button id="btnMensagemCarinho" class="btn-action" style="background:#e8f8f5; border:1px solid var(--success); color:#1a1a1a"><i class="fa-solid fa-heart" style="color:var(--success);"></i> AGRADECER PAGAMENTO</button>
            <button onclick="document.getElementById('modalHistorico').style.display='none'" class="btn-action">FECHAR</button>
        </div>
    </div>
</div>

<div id="modalResumo" class="modal">
    <div class="modal-content">
        <h3 id="nomeClienteResumo"></h3>
        <p style="text-align:center; font-size:11px; color:#999; margin-bottom:15px; font-weight:700;">HISTÓRICO DE PRODUTOS QUITADOS</p>
        <div class="extrato-container" id="corpoExtrato"></div>
        <button onclick="window.print()" class="btn-action no-print" style="margin-top: 15px; background: #f8f9fa; color:#333">
            <i class="fa-solid fa-file-pdf" style="color: #e74c3c;"></i> SALVAR EXTRATO (PDF)
        </button>
        <button onclick="document.getElementById('modalResumo').style.display='none'" class="btn-main no-print" style="margin-top:10px;">FECHAR</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ebfkwuslmneswvovygwh.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViZmt3dXNsbW5lc3d2b3Z5Z3doIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzU3NzUsImV4cCI6MjA5MDc1MTc3NX0.ElCyWYPr330VLsY6LZIa41Fg9QR_VaHeBj36jQ8oVt0'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let dbClientes = [], dbProdutos = [], clienteEmEdicao = null;
    let pixConfig = { chave_pix: '', nome_pix: '', cidade_pix: '' }; 
    let clienteAbertoId = null; 
    let itensPendentesGlobal = []; 

    async function checkUser() {
        carregarTema();
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
            carregarDados();
            configurarRealtime();
        }
    }

    async function carregarDados() {
        const { data: p } = await _supabase.from('produtos').select('*').order('nome');
        dbProdutos = p || [];
        const { data: c } = await _supabase.from('clientes').select('*, compras(*)').order('nome');
        dbClientes = c || [];
        
        const { data: config, error } = await _supabase.from('configuracoes').select('*').maybeSingle();
        if (config) pixConfig = config;
        render();
    }

    function toggleTheme() {
        const body = document.body;
        body.classList.toggle('dark-mode');
        localStorage.setItem('tema', body.classList.contains('dark-mode') ? 'dark' : 'light');
    }

    function carregarTema() { if (localStorage.getItem('tema') === 'dark') document.body.classList.add('dark-mode'); }
    function mascaraData(input) { let v = input.value.replace(/\D/g, ""); if (v.length > 2) v = v.substring(0, 2) + "/" + v.substring(2, 4); input.value = v; }
    
    function configurarRealtime() { 
        _supabase.channel('db_changes')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'compras' }, () => carregarDados())
            .on('postgres_changes', { event: '*', schema: 'public', table: 'clientes' }, () => carregarDados())
            .on('postgres_changes', { event: '*', schema: 'public', table: 'configuracoes' }, (payload) => { pixConfig = payload.new; })
            .subscribe(); 
    }

    async function sair() { await _supabase.auth.signOut(); window.location.reload(); }

    function render() {
        const busca = document.getElementById('buscaCliente').value.toLowerCase();
        const listaDiv = document.getElementById('lista');
        listaDiv.innerHTML = '<datalist id="lista-prod">' + dbProdutos.map(p => `<option value="${p.nome}">`).join('') + '</datalist>';
        let totalH = 0, totalG = 0;
        const hoje = new Date().toLocaleDateString('pt-BR').substring(0,5);

        dbClientes.filter(c => c.nome.toLowerCase().includes(busca)).forEach(c => {
            const saldo = c.compras.reduce((acc, i) => acc + i.valor_total, 0);
            totalG += saldo;
            c.compras.forEach(cp => { if(new Date(cp.data).toLocaleDateString('pt-BR').substring(0,5) === hoje && cp.valor_total > 0) totalH += cp.valor_total; });

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-header">
                    <span style="font-weight:800; color: var(--brown);">${c.nome.toUpperCase()}</span>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-edit" onclick="prepararEdicao(${c.id})"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button class="btn-delete" onclick="excluir(${c.id})"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>
                <span class="price-tag">R$ ${saldo.toFixed(2)}</span>
                <div style="display:grid; grid-template-columns: 2fr 1fr 1.2fr; gap:5px; margin-bottom: 10px;">
                    <input type="text" id="it-${c.id}" list="lista-prod" placeholder="Produto" oninput="atualizarPreco(this, ${c.id})">
                    <input type="number" id="qt-${c.id}" value="1">
                    <input type="number" id="vl-${c.id}" placeholder="R$">
                </div>
                <button class="btn-main" onclick="salvarVenda(${c.id})">ANOTAR PEDIDO</button>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                    <button class="btn-action" onclick="abrirHistorico(${c.id})">COBRAR / PAGAR</button>
                    <button class="btn-action" onclick="abrirResumoConta(${c.id})">RESUMO DA CONTA</button>
                </div>`;
            listaDiv.appendChild(card);
        });
        document.getElementById('totalHoje').innerText = `R$ ${totalH.toFixed(2)}`;
        document.getElementById('totalGeral').innerText = `R$ ${totalG.toFixed(2)}`;
    }

    window.abrirHistorico = (id) => {
        clienteAbertoId = id;
        const c = dbClientes.find(x => x.id === id);
        let totalPagos = Math.abs(c.compras.filter(i => i.valor_total < 0).reduce((acc, i) => acc + i.valor_total, 0));
        const comprasApenas = c.compras.filter(i => i.valor_total > 0).sort((a,b) => new Date(a.data) - new Date(b.data));
        
        itensPendentesGlobal = [];
        comprasApenas.forEach(item => { 
            if (totalPagos >= item.valor_total) { totalPagos -= item.valor_total; } 
            else { itensPendentesGlobal.push({...item, valor_exibir: item.valor_total - totalPagos}); totalPagos = 0; } 
        });

        document.getElementById('nomeClienteModal').innerText = c.nome.toUpperCase();
        const listAbertos = document.getElementById('listaItensModal');
        listAbertos.innerHTML = itensPendentesGlobal.length === 0 ? '<div style="text-align:center; color:var(--success); padding:20px;">TUDO PAGO! ✅</div>' : '';
        
        itensPendentesGlobal.forEach(i => {
            const qT = i.qtd > 1 ? `${i.qtd}x ` : "";
            listAbertos.innerHTML += `<label class="item-selecionavel"><input type="checkbox" class="chk-item" data-valor="${i.valor_exibir}"><div class="item-detalhe"><div><small>${new Date(i.data).toLocaleDateString('pt-BR').substring(0,5)}</small><br>${qT}${i.descricao}</div><b>R$ ${i.valor_exibir.toFixed(2)}</b></div></label>`;
        });

        document.querySelectorAll('.chk-item').forEach(el => el.addEventListener('change', atualizarSoma));
        document.getElementById('modalHistorico').style.display='block';
        document.getElementById('containerSoma').style.display='none';
    };

    // FUNÇÃO UNIFICADA WHATSAPP (SEM DUPLICIDADE)
    function enviarZapDoces(tipo) {
        const c = dbClientes.find(x => x.id === clienteAbertoId);
        const checks = Array.from(document.querySelectorAll('.chk-item:checked'));
        
        let itensParaEnviar = checks.length > 0 
            ? itensPendentesGlobal.filter((item, index) => document.querySelectorAll('.chk-item')[index].checked)
            : itensPendentesGlobal;

        if (itensParaEnviar.length === 0) return alert("Selecione os itens ou verifique o saldo!");

        let total = itensParaEnviar.reduce((acc, i) => acc + i.valor_exibir, 0);
        let listaMsg = itensParaEnviar.map(i => {
            const dataF = new Date(i.data).toLocaleDateString('pt-BR').substring(0,5);
            const qtdF = i.qtd > 1 ? `${i.qtd}x ` : "";
            return `🔸 ${dataF} ${qtdF}${i.descricao}: R$ ${i.valor_exibir.toFixed(2)}`;
        }).join('%0A');

        let texto = "";

        if (tipo === 'pix') {
            texto = `*Brasil Doces* 🍬%0A%0AOi! ✨ Tudo bem?%0ASegue o resumo para acerto dos seus pedidos:%0A%0A${listaMsg}%0A%0A💰 *TOTAL: R$ ${total.toFixed(2)}*%0A%0A🔑 *Chave PIX:* ${pixConfig.chave_pix}%0AMuito obrigada! Beijos, Fer. ♡`;
        } else if (tipo === 'mensal') {
            const mesAtual = new Date().toLocaleDateString('pt-BR', { month: 'long' });
            texto = `Olá! Tudo bem? ✨%0AEstou passando para fecharmos o seu resumo de *${mesAtual}* na Brasil Doces:%0A%0A${listaMsg}%0A%0A💰 *TOTAL: R$ ${total.toFixed(2)}*%0A%0AQuando puder, me avise para organizarmos! Beijos, Fer. ♡`;
        } else {
            texto = `Oi! ✨ Segue o resumo dos seus pedidos na Brasil Doces:%0A%0A${listaMsg}%0A%0A💰 *Total Parcial: R$ ${total.toFixed(2)}*%0A%0AQualquer dúvida estou à disposição! Beijos, Fer. ♡`;
        }

        window.open(`https://wa.me/55${c.tel}?text=${texto}`, '_blank');
    }

    document.getElementById('btnZapRapido').onclick = () => enviarZapDoces('resumo');
    document.getElementById('btnPixZap').onclick = () => enviarZapDoces('pix');
    document.getElementById('btnFechamentoMensal').onclick = () => enviarZapDoces('mensal');

    window.abrirResumoConta = (id) => {
        const c = dbClientes.find(x => x.id === id);
        document.getElementById('nomeClienteResumo').innerText = c.nome.toUpperCase();
        const corpo = document.getElementById('corpoExtrato');
        corpo.innerHTML = '<div class="extrato-header"><div>DATA</div><div>QTD</div><div>PRODUTO</div><div style="text-align:right">VALOR</div></div>';
        c.compras.filter(i => i.valor_total > 0).forEach(i => {
            corpo.innerHTML += `<div class="extrato-item"><div>${new Date(i.data).toLocaleDateString('pt-BR').substring(0,5)}</div><div class="qtd">${i.qtd}x</div><div>${i.descricao}</div><div class="valor">R$ ${i.valor_total.toFixed(2)}</div></div>`;
        });
        document.getElementById('modalResumo').style.display = 'block';
    };

    document.getElementById('btnMensagemCarinho').onclick = () => {
        const c = dbClientes.find(x => x.id === clienteAbertoId);
        window.open(`https://wa.me/55${c.tel}?text=Oi! Passando para agradecer pelo pagamento. ✨ É um prazer ter você como cliente! ❤️`, '_blank');
    };

    window.atualizarSoma = () => {
        let soma = 0;
        document.querySelectorAll('.chk-item:checked').forEach(cb => soma += parseFloat(cb.getAttribute('data-valor')));
        document.getElementById('txtSoma').innerText = `R$ ${soma.toFixed(2)}`;
        document.getElementById('containerSoma').style.display = soma > 0 ? 'block' : 'none';
    };

    window.processarPagamento = async (clienteId) => {
        let soma = 0;
        document.querySelectorAll('.chk-item:checked').forEach(cb => soma += parseFloat(cb.getAttribute('data-valor')));
        if (soma <= 0) return alert("Selecione algo!");
        if (confirm(`Confirmar pagamento de R$ ${soma.toFixed(2)}?`)) {
            await _supabase.from('compras').insert([{ cliente_id: clienteId, descricao: "PAGAMENTO EFETUADO", valor_total: -soma }]);
            document.getElementById('modalHistorico').style.display = 'none';
            carregarDados();
        }
    };

    window.salvarVenda = async (id) => {
        const it = document.getElementById(`it-${id}`).value.toUpperCase() || "DOCES", qt = parseInt(document.getElementById(`qt-${id}`).value) || 1, vl = parseFloat(document.getElementById(`vl-${id}`).value);
        if(!vl) return alert("Insira o valor!");
        await _supabase.from('compras').insert([{ cliente_id: id, descricao: it, qtd: qt, valor_total: (qt * vl) }]);
        document.getElementById(`it-${id}`).value = ''; document.getElementById(`vl-${id}`).value = '';
        carregarDados();
    };

    window.prepararEdicao = (id) => {
        const c = dbClientes.find(x => x.id === id); clienteEmEdicao = id;
        document.getElementById('novoNome').value = c.nome; document.getElementById('novoTel').value = c.tel;
        document.getElementById('novoLimite').value = c.limite; document.getElementById('novoNiver').value = c.aniversario || '';
        document.getElementById('btnCadastrar').innerText = "SALVAR ALTERAÇÕES"; window.scrollTo({ top: 0, behavior: 'smooth' });
    };

    window.excluir = async (id) => { if(confirm("Excluir cliente?")) await _supabase.from('clientes').delete().eq('id', id); };
    window.atualizarPreco = (input, cId) => {
        const prod = dbProdutos.find(x => x.nome.toUpperCase() === input.value.toUpperCase());
        if (prod) document.getElementById(`vl-${cId}`).value = prod.preco;
    };

    document.getElementById('btnCadastrar').onclick = async () => {
        const nome = document.getElementById('novoNome').value, tel = document.getElementById('novoTel').value, niver = document.getElementById('novoNiver').value, lim = document.getElementById('novoLimite').value;
        if(!nome || !tel) return alert("Preencha tudo!");
        const payload = { nome, tel, aniversario: niver, limite: parseFloat(lim) };
        if(clienteEmEdicao) await _supabase.from('clientes').update(payload).eq('id', clienteEmEdicao);
        else await _supabase.from('clientes').insert([payload]);
        clienteEmEdicao = null; document.getElementById('novoNome').value = ''; document.getElementById('novoTel').value = '';
        document.getElementById('btnCadastrar').innerText = "ADICIONAR CLIENTE"; carregarDados();
    };

    document.getElementById('btnLogin').onclick = async () => {
        const { error } = await _supabase.auth.signInWithPassword({ email: document.getElementById('loginEmail').value, password: document.getElementById('loginPassword').value });
        if(error) alert("Erro: " + error.message); else checkUser();
    };

    checkUser();
</script>
</body>
</html>
