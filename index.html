<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="icon" type="image/png" sizes="512x512" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#ff85a2">
    <meta name="theme-color" content="#ff85a2">

    <title>Brasil Doces®</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --bg: #fff0f3; --card: #ffffff; --primary: #ff85a2; --accent: #d63384; 
            --text: #4a4a4a; --danger: #e74c3c; --border: #ffd1dc; --success: #2ecc71;
            --brown: #6d4c41; --info: #3498db; --gold: #FFD700;
        }

        body.dark-mode {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --border: #333333;
            --primary: #ffb1c1; --accent: #ff85a2; --brown: #ffdadf; --success: #4cd137;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; transition: background 0.3s, color 0.3s; }
        
        #authContainer { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; width: 100%; background-color: var(--bg); padding: 20px; box-sizing: border-box; }
        .login-logo { width: 220px; height: auto; display: block; margin: 0 auto -25px auto; mix-blend-mode: multiply; position: relative; z-index: 10; }
        .login-card { background: var(--card); padding: 30px; border-radius: 24px; width: 100%; max-width: 320px; box-shadow: 0 10px 30px rgba(214, 51, 132, 0.1); border: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }

        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .zn-brand-text { font-family: 'Pacifico', cursive; font-size: 1.6em; color: var(--brown); margin: 0; line-height: 1.1; }
        .zn-slogan { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: #8e736b; margin-top: -2px; }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .dash-box { background: var(--card); padding: 15px; border-radius: 16px; text-align: center; border: 1px solid var(--border); }
        .dash-val { font-size: 1.2em; font-weight: 800; color: var(--accent); }

        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 18px; border: 1px solid var(--border); border-left: 5px solid var(--primary); position: relative; transition: transform 0.3s; }
        
        /* DESTAQUE ANIVERSARIANTE */
        .card-niver-destaque {
            border: 3px solid var(--gold) !important;
            background: linear-gradient(145deg, #ffffff, #fff9e6) !important;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3) !important;
            transform: scale(1.02);
            z-index: 5;
        }
        .label-niver-hoje { background: var(--gold); color: #000; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 800; margin-left: 5px; }

        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .price-tag { color: var(--brown); font-size: 1.8em; font-weight: 900; margin-bottom: 12px; display: block; }

        input { width: 100%; padding: 14px; margin: 6px 0; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); box-sizing: border-box; font-size: 16px; }
        button { padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main { background: var(--accent); color: white; margin-top: 8px; }
        .btn-action { background: var(--card); color: var(--brown); border: 1px solid var(--border); margin-top: 8px; }
        .btn-zap { background: #25D366; color: white; margin-top: 8px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; padding: 20px; box-sizing: border-box; backdrop-filter: blur(4px); }
        .modal-content { background: var(--card); border-radius: 24px; padding: 25px; max-width: 420px; margin: auto; max-height: 85vh; overflow-y: auto; }

        .item-selecionavel { display: flex; align-items: center; gap: 12px; padding: 12px 8px; border-bottom: 1px solid var(--border); }
        .chk-item { width: 20px; height: 20px; }

        @keyframes balancar { 0%, 100% { transform: rotate(0); } 25% { transform: rotate(10deg); } 75% { transform: rotate(-10deg); } }
        .ico-niver { display: inline-block; animation: balancar 1s infinite; }
    </style>
</head>
<body>

<div id="authContainer">
    <img src="logo.png" alt="Brasil Doces" class="login-logo">
    <div class="login-card">
        <input type="email" id="loginEmail" placeholder="E-mail">
        <input type="password" id="loginPassword" placeholder="Senha">
        <button id="btnLogin" class="btn-main" onclick="entrar()">ACESSAR SISTEMA</button>
    </div>
</div>

<div id="mainContainer" style="display:none; max-width:480px; margin:auto;">
    <div class="header-top">
        <div>
            <h1 class="zn-brand-text">Brasil Doces</h1>
            <span class="zn-slogan">Feito com amor ♡</span>
        </div>
        <div style="display:flex; gap:8px;">
            <button onclick="window.location.reload()" class="btn-action" style="width:40px; margin:0;"><i class="fa-solid fa-rotate"></i></button>
            <button onclick="sair()" class="btn-action" style="width:auto; margin:0; color:var(--danger)">SAIR</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="dash-box"><span style="font-size:10px">PEDIDOS HOJE</span><div class="dash-val" id="totalHoje">R$ 0,00</div></div>
        <div class="dash-box"><span style="font-size:10px">SALDO CLIENTES</span><div class="dash-val" id="totalGeral">R$ 0,00</div></div>
    </div>

    <div class="card" style="border-top: 3px solid var(--accent); border-left: none;">
        <div id="tituloForm" style="font-weight: 800; margin-bottom: 10px;">CADASTRAR NOVO CLIENTE</div>
        <input type="text" id="novoNome" placeholder="Nome Completo">
        <input type="tel" id="novoTel" placeholder="WhatsApp">
        <input type="text" id="novoNiver" placeholder="Aniversário (Ex: 15/04)" maxlength="5">
        <input type="number" id="novoLimite" placeholder="Limite" value="1000">
        <button id="btnCadastrar" class="btn-main" onclick="salvarCliente()">ADICIONAR CLIENTE</button>
    </div>

    <input type="text" id="buscaCliente" placeholder="🔍 Procurar por nome..." onkeyup="render()">
    <div id="lista"></div>
</div>

<div id="modalHistorico" class="modal">
    <div class="modal-content">
        <h3 id="nomeClienteModal" style="text-align:center"></h3>
        <button class="btn-zap" onclick="enviarZapDoces('consumo')"><i class="fa-brands fa-whatsapp"></i> INFORMAR CONSUMO</button>

        <div id="listaItensModal" style="margin-top:20px"></div>
        
        <div id="containerSoma" style="display:none; background:#f9f9f9; padding:15px; border-radius:12px; margin-top:15px">
            <div style="display:flex; justify-content:space-between">
                <b>TOTAL:</b> <span id="txtSoma" style="color:var(--accent); font-weight:800">R$ 0,00</span>
            </div>
            <button class="btn-main" style="background:var(--success)" onclick="processarPagamento()">PAGAR SELECIONADOS</button>
        </div>

        <button class="btn-zap" style="background:var(--info)" onclick="enviarZapDoces('pix')">COBRAR COM PIX</button>
        <button class="btn-zap" style="background:var(--success); opacity:0.8" onclick="enviarZapDoces('agradecer')">AGRADECER PAGAMENTO</button>
        <button onclick="fecharModais()" class="btn-action">FECHAR</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ebfkwuslmneswvovygwh.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViZmt3dXNsbW5lc3d2b3Z5Z3doIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzU3NzUsImV4cCI6MjA5MDc1MTc3NX0.ElCyWYPr330VLsY6LZIa41Fg9QR_VaHeBj36jQ8oVt0'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let dbClientes = [], dbProdutos = [], clienteAbertoId = null, clienteEmEdicao = null;

    async function entrar() {
        const e = document.getElementById('loginEmail').value;
        const s = document.getElementById('loginPassword').value;
        const { error } = await _supabase.auth.signInWithPassword({ email: e, password: s });
        if (error) alert("Erro ao acessar"); else location.reload();
    }

    async function sair() { await _supabase.auth.signOut(); location.reload(); }

    async function checkUser() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
            await carregarDados();
            configurarRealtime();
        }
    }

    async function carregarDados() {
        const { data: p } = await _supabase.from('produtos').select('*').order('nome');
        dbProdutos = p || [];
        const { data: c } = await _supabase.from('clientes').select('*, compras(*)').order('nome');
        dbClientes = c || [];
        
        let hoje = new Date().toISOString().split('T')[0], tHoje = 0, tGeral = 0;
        dbClientes.forEach(cli => {
            cli.compras.forEach(co => {
                tGeral += co.valor_total;
                if(co.data.startsWith(hoje) && co.valor_total > 0) tHoje += co.valor_total;
            });
        });
        document.getElementById('totalHoje').innerText = `R$ ${tHoje.toFixed(2)}`;
        document.getElementById('totalGeral').innerText = `R$ ${tGeral.toFixed(2)}`;
        render();
    }

    function configurarRealtime() {
        _supabase.channel('db-changes').on('postgres_changes', { event: '*', schema: 'public' }, () => carregarDados()).subscribe();
    }

    function render() {
        const busca = document.getElementById('buscaCliente').value.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const listaDiv = document.getElementById('lista');
        listaDiv.innerHTML = '';

        const dataHoje = `${String(new Date().getDate()).padStart(2, '0')}/${String(new Date().getMonth() + 1).padStart(2, '0')}`;

        let filtrados = dbClientes.filter(c => c.nome.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").includes(busca));

        if (busca === "") {
            filtrados.sort((a, b) => {
                if (a.aniversario === dataHoje && b.aniversario !== dataHoje) return -1;
                if (a.aniversario !== dataHoje && b.aniversario === dataHoje) return 1;
                return a.nome.localeCompare(b.nome);
            });
        }

        filtrados.forEach(c => {
            const saldo = c.compras.reduce((acc, i) => acc + i.valor_total, 0);
            const isNiver = (c.aniversario === dataHoje);
            const card = document.createElement('div');
            card.className = `card ${isNiver ? 'card-niver-destaque' : ''}`;
            card.innerHTML = `
                <div class="card-header">
                    <b>${c.nome.toUpperCase()} ${isNiver ? '<span class="ico-niver">🎁</span><span class="label-niver-hoje">HOJE!</span>' : ''}</b>
                    <div>
                        <button onclick="prepararEdicao(${c.id})" style="display:inline; width:auto; background:none; color:blue"><i class="fa-solid fa-pen"></i></button>
                        <button onclick="excluirCliente(${c.id})" style="display:inline; width:auto; background:none; color:red"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
                <span class="price-tag">R$ ${saldo.toFixed(2)}</span>
                <div style="display:grid; grid-template-columns: 2fr 1fr; gap:5px">
                    <input type="text" id="it-${c.id}" list="lista-prod" placeholder="Produto" oninput="sugerirPreco(this, ${c.id})">
                    <input type="number" id="vl-${c.id}" placeholder="R$">
                </div>
                <button class="btn-main" onclick="salvarVenda(${c.id})">ANOTAR PEDIDO</button>
                <button class="btn-action" onclick="abrirHistorico(${c.id})">PAGAMENTO / COBRANÇA</button>
            `;
            listaDiv.appendChild(card);
        });
    }

    async function salvarVenda(id) {
        const it = document.getElementById(`it-${id}`).value || "DOCE";
        const vl = parseFloat(document.getElementById(`vl-${id}`).value);
        if (!vl) return alert("Valor vazio!");
        await _supabase.from('compras').insert([{ cliente_id: id, descricao: it, valor_total: vl, qtd: 1 }]);
        alert("Anotado!");
        carregarDados();
    }

    async function salvarCliente() {
        const n = document.getElementById('novoNome').value;
        const t = document.getElementById('novoTel').value;
        const d = document.getElementById('novoNiver').value;
        const l = document.getElementById('novoLimite').value;
        
        if (clienteEmEdicao) {
            await _supabase.from('clientes').update({ nome: n, tel: t, aniversario: d, limite: l }).eq('id', clienteEmEdicao);
            clienteEmEdicao = null;
        } else {
            await _supabase.from('clientes').insert([{ nome: n, tel: t, aniversario: d, limite: l }]);
        }
        
        document.querySelectorAll('#mainContainer input').forEach(i => i.value = '');
        document.getElementById('btnCadastrar').innerText = "ADICIONAR CLIENTE";
        carregarDados();
    }

    function prepararEdicao(id) {
        const c = dbClientes.find(x => x.id === id);
        clienteEmEdicao = id;
        document.getElementById('novoNome').value = c.nome;
        document.getElementById('novoTel').value = c.tel;
        document.getElementById('novoNiver').value = c.aniversario;
        document.getElementById('btnCadastrar').innerText = "SALVAR ALTERAÇÕES";
        window.scrollTo(0,0);
    }

    async function excluirCliente(id) {
        if(confirm("Excluir cliente?")) {
            await _supabase.from('clientes').delete().eq('id', id);
            carregarDados();
        }
    }

    function sugerirPreco(input, id) {
        const p = dbProdutos.find(x => x.nome.toLowerCase() === input.value.toLowerCase());
        if (p) document.getElementById(`vl-${id}`).value = p.preco;
    }

    window.abrirHistorico = (id) => {
        clienteAbertoId = id;
        const c = dbClientes.find(x => x.id === id);
        document.getElementById('nomeClienteModal').innerText = c.nome.toUpperCase();
        
        let pendentes = [];
        let totalPagos = Math.abs(c.compras.filter(i => i.valor_total < 0).reduce((a, b) => a + b.valor_total, 0));
        let compras = c.compras.filter(i => i.valor_total > 0).sort((a,b) => new Date(a.data) - new Date(b.data));

        compras.forEach(item => {
            if (totalPagos >= item.valor_total) totalPagos -= item.valor_total;
            else { pendentes.push({...item, valor_final: item.valor_total - totalPagos}); totalPagos = 0; }
        });

        const lista = document.getElementById('listaItensModal');
        lista.innerHTML = pendentes.length ? '' : '<p style="text-align:center">Tudo pago! ✅</p>';
        pendentes.forEach(i => {
            lista.innerHTML += `
                <label class="item-selecionavel">
                    <input type="checkbox" class="chk-item" data-valor="${i.valor_final}" onchange="atualizarSoma()">
                    <div style="flex:1">
                        <small>${new Date(i.data).toLocaleDateString('pt-BR')}</small><br>
                        ${i.descricao}
                    </div>
                    <b>R$ ${i.valor_final.toFixed(2)}</b>
                </label>
            `;
        });
        document.getElementById('modalHistorico').style.display = 'block';
    };

    window.atualizarSoma = () => {
        let s = 0;
        document.querySelectorAll('.chk-item:checked').forEach(c => s += parseFloat(c.dataset.valor));
        document.getElementById('txtSoma').innerText = `R$ ${s.toFixed(2)}`;
        document.getElementById('containerSoma').style.display = s > 0 ? 'block' : 'none';
    };

    window.processarPagamento = async () => {
        let s = 0;
        document.querySelectorAll('.chk-item:checked').forEach(c => s += parseFloat(c.dataset.valor));
        if (confirm(`Pagar R$ ${s.toFixed(2)}?`)) {
            await _supabase.from('compras').insert([{ cliente_id: clienteAbertoId, descricao: "PAGAMENTO", valor_total: -s }]);
            fecharModais();
            carregarDados();
        }
    };

    function fecharModais() { 
        document.getElementById('modalHistorico').style.display = 'none';
        document.getElementById('containerSoma').style.display = 'none';
    }

    async function enviarZapDoces(tipo) {
        const c = dbClientes.find(x => x.id === clienteAbertoId);
        let msg = "";
        if (tipo === 'agradecer') msg = "Oi! Muito obrigada pelo pagamento! ✨ Beijos, Fer. ❤️";
        else if (tipo === 'consumo') msg = `Oi! Passando para informar seu consumo recente. ✨`;
        else msg = `Oi! Segue o resumo dos seus pedidos para fecharmos. ✨`;
        
        window.open(`https://api.whatsapp.com/send?phone=55${c.tel.replace(/\D/g,'')}&text=${encodeURIComponent(msg)}`);
    }

    checkUser();
</script>

</body>
</html>
