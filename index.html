<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="icon" type="image/png" sizes="512x512" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#ff85a2">
    <meta name="theme-color" content="#ff85a2">

    <title>Brasil Doces®</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --bg: #fff0f3; --card: #ffffff; --primary: #ff85a2; --accent: #d63384; 
            --text: #4a4a4a; --danger: #e74c3c; --border: #ffd1dc; --success: #2ecc71;
            --brown: #6d4c41; --info: #3498db;
        }

        body.dark-mode {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --border: #333333;
            --primary: #ffb1c1; --accent: #ff85a2; --brown: #ffdadf; --success: #4cd137;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; transition: background 0.3s, color 0.3s; }
        
        #authContainer { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; width: 100%; background-color: var(--bg); padding: 20px; box-sizing: border-box; }
        .login-logo { width: 220px; height: auto; display: block; margin: 0 auto -25px auto; mix-blend-mode: multiply; position: relative; z-index: 10; }
        .login-card { background: var(--card); padding: 30px; border-radius: 24px; width: 100%; max-width: 320px; box-shadow: 0 10px 30px rgba(214, 51, 132, 0.1); border: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }

        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .zn-brand-text { font-family: 'Pacifico', cursive; font-size: 1.6em; color: var(--brown); margin: 0; line-height: 1.1; }
        .zn-slogan { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: #8e736b; margin-top: -2px; }
        
        .btn-logout { background: white; border: 1px solid var(--danger); color: var(--danger); padding: 8px 15px; border-radius: 10px; font-size: 12px; font-weight: 700; }
        .btn-theme { background: var(--card); border: 1px solid var(--border); color: var(--accent); width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .dash-box { background: var(--card); padding: 15px; border-radius: 16px; text-align: center; border: 1px solid var(--border); }
        .dash-label { font-size: 10px; color: #999; text-transform: uppercase; display: block; margin-bottom: 5px; font-weight: 700; }
        .dash-val { font-size: 1.2em; font-weight: 800; color: var(--accent); }

        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 18px; border: 1px solid var(--border); border-left: 5px solid var(--primary); box-shadow: 0 6px 20px rgba(0,0,0,0.05); }
        .price-tag { color: var(--brown); font-size: 1.8em; font-weight: 900; margin-bottom: 12px; display: block; }

        input { width: 100%; padding: 14px; margin: 6px 0; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); box-sizing: border-box; font-size: 16px; outline: none; }
        button { padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-main { background: var(--accent); color: white; margin-top: 8px; }
        .btn-action { background: var(--card); color: var(--brown); border: 1px solid var(--border); margin-top: 8px; }
        .btn-zap { background: #25D366; color: white; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; padding: 20px; box-sizing: border-box; backdrop-filter: blur(4px); }
        .modal-content { background: var(--card); border-radius: 24px; padding: 25px; max-width: 420px; margin: auto; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border); }
        
        #nomeClienteResumo { text-align: center; font-weight: 800; font-size: 1.5em; margin-bottom: 15px; text-transform: uppercase; border-bottom: 2px solid var(--border); padding-bottom: 10px; display: block; }

        /* ESTILO DO EXTRATO */
        .extrato-container { background: var(--card); border: 1px dashed var(--border); border-radius: 12px; padding: 15px; font-size: 0.9em; }
        .extrato-header { display: grid; grid-template-columns: 45px 35px 1fr 70px; gap: 5px; font-weight: 800; font-size: 10px; text-transform: uppercase; color: #999; border-bottom: 2px solid var(--border); padding-bottom: 8px; margin-bottom: 10px; }
        .extrato-item { display: grid; grid-template-columns: 45px 35px 1fr 70px; gap: 5px; padding: 8px 0; border-bottom: 1px solid var(--border); align-items: center; }
        .extrato-item .qtd { font-weight: 700; color: var(--accent); text-align: center; }
        .extrato-item .valor { text-align: right; font-weight: 700; }
        .extrato-item.pagamento { color: var(--success); font-style: italic; }

        @media print {
            body * { visibility: hidden; }
            #modalResumo, #modalResumo * { visibility: visible; }
            #modalResumo { position: absolute; left: 0; top: 0; width: 100%; background: white; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>

<div id="authContainer">
    <img src="logo.png" alt="Brasil Doces" class="login-logo">
    <div class="login-card">
        <input type="email" id="loginEmail" placeholder="E-mail">
        <input type="password" id="loginPassword" placeholder="Senha">
        <button id="btnLogin" class="btn-main">ACESSAR SISTEMA</button>
    </div>
</div>

<div id="mainContainer" style="display:none; max-width:480px; margin:auto;">
    <div class="header-top">
        <div>
            <h1 class="zn-brand-text">Brasil Doces</h1>
            <span class="zn-slogan">Feito com amor ♡</span>
        </div>
        <div style="display:flex; gap:8px;">
            <button class="btn-theme" onclick="toggleTheme()" id="themeBtn"><i class="fa-solid fa-moon"></i></button>
            <button onclick="sair()" class="btn-logout">SAIR</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="dash-box"><span class="dash-label">PEDIDOS HOJE</span><div class="dash-val" id="totalHoje">R$ 0,00</div></div>
        <div class="dash-box"><span class="dash-label">SALDO CLIENTES</span><div class="dash-val" id="totalGeral">R$ 0,00</div></div>
    </div>

    <input type="text" id="buscaCliente" placeholder="🔍 Procurar por nome..." onkeyup="render()">
    <div id="lista"></div>
</div>

<div id="modalHistorico" class="modal">
    <div class="modal-content">
        <h3 id="nomeClienteModal" style="text-align:center; text-transform:uppercase;"></h3>
        <div id="listaItensModal"></div>
        <div id="containerSoma" style="display:none; margin-top:15px; padding:15px; background:var(--bg); border-radius:12px;">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <span style="font-weight:bold; font-size:12px;">SELECIONADO:</span>
                <span id="txtSoma" style="font-weight:800; color:var(--accent); font-size:18px;">R$ 0,00</span>
            </div>
            <button id="btnPagarSelecionados" class="btn-main" style="background:var(--success);">PAGAR SELECIONADOS</button>
        </div>
        <button id="btnFechamentoMensal" class="btn-action">FECHAMENTO MENSAL</button>
        <button onclick="document.getElementById('modalHistorico').style.display='none'" class="btn-action">FECHAR</button>
    </div>
</div>

<div id="modalResumo" class="modal">
    <div class="modal-content">
        <h3 id="nomeClienteResumo"></h3>
        <div class="extrato-container" id="corpoExtrato"></div>
        <button onclick="window.print()" class="btn-action no-print"><i class="fa-solid fa-file-pdf"></i> SALVAR PDF</button>
        <button onclick="document.getElementById('modalResumo').style.display='none'" class="btn-main no-print">FECHAR</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ebfkwuslmneswvovygwh.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViZmt3dXNsbW5lc3d2b3Z5Z3doIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzU3NzUsImV4cCI6MjA5MDc1MTc3NX0.ElCyWYPr330VLsY6LZIa41Fg9QR_VaHeBj36jQ8oVt0'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let dbClientes = [], dbProdutos = [];

    async function checkUser() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
            carregarDados();
        }
    }

    async function carregarDados() {
        const { data: c } = await _supabase.from('clientes').select('*, compras(*)').order('nome');
        dbClientes = c || [];
        render();
    }

    function render() {
        const busca = document.getElementById('buscaCliente').value.toLowerCase();
        const listaDiv = document.getElementById('lista');
        listaDiv.innerHTML = '';
        
        let totalG = 0;
        dbClientes.filter(c => c.nome.toLowerCase().includes(busca)).forEach(c => {
            const saldo = c.compras.reduce((acc, i) => acc + i.valor_total, 0);
            totalG += saldo;
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div style="font-weight:800; color:var(--brown);">${c.nome.toUpperCase()}</div>
                <span class="price-tag">R$ ${saldo.toFixed(2)}</span>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                    <button class="btn-action" onclick="abrirHistorico(${c.id})">COBRAR / PAGAR</button>
                    <button class="btn-action" onclick="abrirResumoConta(${c.id})">RESUMO DA CONTA</button>
                </div>`;
            listaDiv.appendChild(card);
        });
        document.getElementById('totalGeral').innerText = `R$ ${totalG.toFixed(2)}`;
    }

    // AJUSTE SOLICITADO: DETALHAMENTO COMPLETO SEM SALDO FINAL
    window.abrirResumoConta = (id) => {
        const c = dbClientes.find(x => x.id === id);
        const corpo = document.getElementById('corpoExtrato');
        document.getElementById('nomeClienteResumo').innerText = c.nome.toUpperCase();
        
        const movimentos = [...c.compras].sort((a, b) => new Date(a.data) - new Date(b.data));

        if (movimentos.length === 0) {
            corpo.innerHTML = "<div style='text-align:center; padding: 20px;'>Nenhuma movimentação.</div>";
        } else {
            let html = `<div class="extrato-header"><span>DATA</span><span>QTD</span><span>PRODUTO</span><span style="text-align:right">VALOR</span></div>`;
            movimentos.forEach(m => {
                const dataF = new Date(m.data).toLocaleDateString('pt-BR').substring(0, 5);
                const isPagamento = m.valor_total < 0;
                html += `
                    <div class="extrato-item ${isPagamento ? 'pagamento' : ''}">
                        <span style="font-size: 11px;">${dataF}</span>
                        <span class="qtd">${isPagamento ? '-' : m.qtd + 'x'}</span>
                        <span style="font-size: 13px;">
                            ${m.descricao} ${isPagamento ? ' <i class="fa-solid fa-check-circle" style="font-size:10px;"></i>' : ''}
                        </span>
                        <span class="valor">R$ ${Math.abs(m.valor_total).toFixed(2)}</span>
                    </div>`;
            });
            corpo.innerHTML = html; // Sem o bloco de saldo devedor
        }
        document.getElementById('modalResumo').style.display = 'block';
    };

    window.abrirHistorico = (id) => {
        const c = dbClientes.find(x => x.id === id);
        document.getElementById('nomeClienteModal').innerText = c.nome;
        document.getElementById('modalHistorico').style.display = 'block';
    };

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
    }

    async function sair() { await _supabase.auth.signOut(); window.location.reload(); }

    document.getElementById('btnLogin').onclick = async () => {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPassword').value;
        const { error } = await _supabase.auth.signInWithPassword({ email, password: pass });
        if(error) alert(error.message); else checkUser();
    };

    checkUser();
</script>
</body>
</html>
