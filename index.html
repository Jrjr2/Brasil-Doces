<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="icon" type="image/png" sizes="512x512" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="#ff85a2">
    <meta name="theme-color" content="#ff85a2">

    <title>Brasil Doces®</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { 
            --bg: #fff0f3; --card: #ffffff; --primary: #ff85a2; --accent: #d63384; 
            --text: #4a4a4a; --danger: #e74c3c; --border: #ffd1dc; --success: #2ecc71;
            --brown: #6d4c41; --info: #3498db;
        }

        body.dark-mode {
            --bg: #121212; --card: #1e1e1e; --text: #e0e0e0; --border: #333333;
            --primary: #ffb1c1; --accent: #ff85a2; --brown: #ffdadf; --success: #4cd137;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; margin: 0; transition: background 0.3s, color 0.3s; }
        
        #authContainer { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; width: 100%; background-color: var(--bg); padding: 20px; box-sizing: border-box; }
        .login-logo { width: 220px; height: auto; display: block; margin: 0 auto -25px auto; mix-blend-mode: multiply; position: relative; z-index: 10; }
        .login-card { background: var(--card); padding: 30px; border-radius: 24px; width: 100%; max-width: 320px; box-shadow: 0 10px 30px rgba(214, 51, 132, 0.1); border: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }

        .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .zn-brand-text { font-family: 'Pacifico', cursive; font-size: 1.6em; color: var(--brown); margin: 0; line-height: 1.1; }
        .zn-slogan { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; color: #8e736b; margin-top: -2px; }
        
        .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .dash-box { background: var(--card); padding: 15px; border-radius: 16px; text-align: center; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .dash-label { font-size: 10px; color: #999; text-transform: uppercase; display: block; margin-bottom: 5px; font-weight: 700; }
        .dash-val { font-size: 1.2em; font-weight: 800; color: var(--accent); }

        .card { background: var(--card); padding: 20px; border-radius: 20px; margin-bottom: 18px; border: 1px solid var(--border); border-left: 5px solid var(--primary); position: relative; box-shadow: 0 6px 20px rgba(0,0,0,0.05); transition: 0.3s; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .price-tag { color: var(--brown); font-size: 1.8em; font-weight: 900; margin-bottom: 12px; display: block; }

        input { width: 100%; padding: 14px; margin: 6px 0; border-radius: 12px; border: 1px solid var(--border); background: var(--card); color: var(--text); box-sizing: border-box; font-size: 16px; outline: none; }
        button { padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 8px; }
        .btn-main { background: var(--accent); color: white; transition: 0.3s; }
        .btn-action { background: var(--card); color: var(--brown); border: 1px solid var(--border); }
        .btn-zap { background: #25D366; color: white; }
        .btn-close-modal { position: absolute; top: 15px; right: 15px; width: 35px; height: 35px; border-radius: 50%; background: #eee; color: #333; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 18px; z-index: 10; border: none; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; padding: 20px; box-sizing: border-box; backdrop-filter: blur(4px); }
        .modal-content { background: var(--card); border-radius: 24px; padding: 25px; max-width: 420px; margin: auto; position: relative; max-height: 85vh; overflow-y: auto; color: var(--text); border: 1px solid var(--border); }
        
        .item-selecionavel { display: flex; align-items: center; gap: 12px; padding: 12px 8px; border-bottom: 1px solid var(--border); cursor: pointer; }
        
        .extrato-container { background: white; border: 1px solid #eee; border-radius: 8px; padding: 15px; color: #333; }
        .extrato-item { display: grid; grid-template-columns: 50px 30px 1fr 70px; gap: 5px; padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 12px; align-items: center; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        @media print {
            body * { visibility: hidden; }
            #modalResumo, #modalResumo * { visibility: visible; }
            #modalResumo { position: absolute; left: 0; top: 0; width: 100%; }
            .no-print { display: none !important; }
            .extrato-container { border: none; }
        }
    </style>
</head>
<body>

<div id="authContainer">
    <img src="logo.png" alt="Brasil Doces" class="login-logo">
    <div class="login-card">
        <input type="email" id="loginEmail" placeholder="E-mail">
        <input type="password" id="loginPassword" placeholder="Senha">
        <button id="btnLogin" class="btn-main">ACESSAR SISTEMA</button>
    </div>
</div>

<div id="mainContainer" style="display:none; max-width:480px; margin:auto;">
    <div class="header-top">
        <div class="zn-column-titles">
            <h1 class="zn-brand-text">Brasil Doces</h1>
            <span class="zn-slogan">Feito com amor ♡</span>
        </div>
        <div style="display:flex; gap:8px;">
            <button onclick="window.location.reload()" class="btn-theme"><i class="fa-solid fa-rotate"></i></button>
            <button class="btn-theme" onclick="toggleTheme()"><i class="fa-solid fa-moon"></i></button>
            <button onclick="sair()" class="btn-logout" style="width:auto; padding:8px 12px; color:var(--danger); border:1px solid var(--danger); background:transparent; border-radius:8px; font-size:12px; font-weight:800;">SAIR</button>
        </div>
    </div>

    <div class="dashboard-grid">
        <div class="dash-box"><span class="dash-label">PEDIDOS HOJE</span><div class="dash-val" id="totalHoje">R$ 0,00</div></div>
        <div class="dash-box"><span class="dash-label">SALDO CLIENTES</span><div class="dash-val" id="totalGeral">R$ 0,00</div></div>
    </div>

    <div class="card" style="border-top: 3px solid var(--accent); border-left: none;">
        <div id="tituloFormCliente" style="font-weight: 800; margin-bottom: 10px; color: var(--brown);">CADASTRAR CLIENTE</div>
        <input type="text" id="novoNome" placeholder="Nome Completo">
        <input type="tel" id="novoTel" placeholder="WhatsApp (DDD+Número)">
        <input type="text" id="novoNiver" placeholder="Aniversário (DD/MM)" maxlength="5" oninput="mascaraData(this)">
        <input type="number" id="novoLimite" placeholder="Limite de Crédito" value="1000">
        <button id="btnCadastrar" class="btn-main">ADICIONAR CLIENTE</button>
    </div>

    <input type="text" id="buscaCliente" placeholder="🔍 Procurar por nome..." onkeyup="render()">
    <div id="lista"></div>
</div>

<div id="modalHistorico" class="modal">
    <div class="modal-content">
        <button class="btn-close-modal" onclick="fecharModais()"><i class="fa-solid fa-xmark"></i></button>
        <h3 id="nomeClienteModal" style="text-align:center;"></h3>
        
        <button onclick="enviarZapDoces('informar')" class="btn-zap" style="margin-bottom: 10px;">
            <i class="fa-brands fa-whatsapp"></i> INFORMAR CONSUMO
        </button>

        <div id="listaItensModal"></div>
        
        <div id="containerSoma" style="display:none; background: #f8f9fa; padding:15px; border-radius:12px; margin-top:15px; border:1px solid #ddd;">
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <span style="font-size: 11px; font-weight: bold;">TOTAL SELECIONADO:</span>
                <span id="txtSoma" style="font-size: 18px; font-weight: 800; color: var(--accent);">R$ 0,00</span>
            </div>
            <button onclick="processarPagamento(clienteAbertoId)" class="btn-main" style="background: var(--success); margin-top:10px;">PAGAR SELECIONADOS</button>
        </div>

        <div style="background: #f0f7ff; padding:15px; border-radius:15px; margin-top:15px;">
            <span style="font-size:10px; font-weight:800;">CONFIGURAR PIX:</span>
            <input type="text" id="cfgChavePix" placeholder="Chave PIX" style="padding:8px; font-size:13px;">
            <input type="text" id="cfgNomePix" placeholder="Nome do Titular" style="padding:8px; font-size:13px;">
            <button onclick="enviarZapDoces('pix')" class="btn-zap" style="background:#3498db;">
                <i class="fa-solid fa-paper-plane"></i> COBRAR + PIX
            </button>
        </div>
        <button onclick="fecharModais()" class="btn-action" style="margin-top:10px;">FECHAR</button>
    </div>
</div>

<div id="modalResumo" class="modal">
    <div class="modal-content">
        <button class="btn-close-modal" onclick="fecharModais()"><i class="fa-solid fa-xmark"></i></button>
        <div id="areaImpressao">
            <div style="text-align:center; margin-bottom:20px;">
                <h2 style="font-family:'Pacifico'; color:#d63384; margin:0;">Brasil Doces</h2>
                <p style="font-size:12px; margin:5px 0;">Recibo de Consumo Mensal</p>
                <p id="dataHoraRecibo" style="font-size:10px; color:#666;"></p>
            </div>
            <h3 id="nomeClienteResumo" style="border-bottom:2px solid #eee; padding-bottom:10px;"></h3>
            <div class="extrato-container" id="corpoExtrato"></div>
        </div>
        <button onclick="window.print()" class="btn-action no-print" style="margin-top: 15px; background: #333; color:white;">
            <i class="fa-solid fa-print"></i> IMPRIMIR / SALVAR PDF
        </button>
        <button onclick="fecharModais()" class="btn-main no-print" style="margin-top:10px;">FECHAR</button>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://ebfkwuslmneswvovygwh.supabase.co'; 
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImViZmt3dXNsbW5lc3d2b3Z5Z3doIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNzU3NzUsImV4cCI6MjA5MDc1MTc3NX0.ElCyWYPr330VLsY6LZIa41Fg9QR_VaHeBj36jQ8oVt0'; 
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let dbClientes = [], dbProdutos = [], clienteAbertoId = null, itensPendentesGlobal = [], pixConfig = { chave_pix: '', nome_pix: '' };

    async function checkUser() {
        const { data: { session } } = await _supabase.auth.getSession();
        if (session) {
            document.getElementById('authContainer').style.display = 'none';
            document.getElementById('mainContainer').style.display = 'block';
            carregarDados();
            carregarConfiguracoes();
        }
    }

    async function carregarDados() {
        const { data: p } = await _supabase.from('produtos').select('*').order('nome');
        dbProdutos = p || [];
        const { data: c } = await _supabase.from('clientes').select('*, compras(*)').order('nome');
        dbClientes = c || [];
        render();
    }

    async function carregarConfiguracoes() {
        const { data } = await _supabase.from('configuracoes').select('*').maybeSingle();
        if (data) {
            pixConfig = data;
            document.getElementById('cfgChavePix').value = data.chave_pix || '';
            document.getElementById('cfgNomePix').value = data.nome_pix || '';
        }
    }

    function mascaraData(input) {
        let v = input.value.replace(/\D/g, "");
        if (v.length > 2) v = v.substring(0, 2) + "/" + v.substring(2, 4);
        input.value = v;
    }

    function fecharModais() {
        document.getElementById('modalHistorico').style.display = 'none';
        document.getElementById('modalResumo').style.display = 'none';
    }

    function render() {
        const busca = document.getElementById('buscaCliente').value.toLowerCase();
        const listaDiv = document.getElementById('lista');
        const hoje = new Date().toLocaleDateString('pt-BR').substring(0, 5);
        
        let totalH = 0, totalG = 0;

        listaDiv.innerHTML = '';
        const filtrados = dbClientes.filter(c => c.nome.toLowerCase().includes(busca));

        filtrados.forEach(c => {
            const saldo = c.compras.reduce((acc, i) => acc + i.valor_total, 0);
            totalG += saldo;
            
            c.compras.forEach(cp => {
                if(new Date(cp.data).toLocaleDateString('pt-BR').substring(0, 5) === hoje && cp.valor_total > 0) totalH += cp.valor_total;
            });

            const ehAniversariante = (c.aniversario === hoje);
            const tagAniversario = ehAniversariante ? 
                `<div style="background:var(--accent); color:white; font-size:10px; font-weight:800; padding:4px 10px; border-radius:20px; display:inline-block; margin-bottom:8px; animation:pulse 1.5s infinite;">
                    <i class="fa-solid fa-cake-candles"></i> HOJE É O ANIVERSÁRIO! 🎉
                </div>` : '';

            const card = document.createElement('div');
            card.className = 'card';
            if(ehAniversariante) card.style.boxShadow = "0 0 15px rgba(214, 51, 132, 0.4)";

            card.innerHTML = `
                ${tagAniversario}
                <div class="card-header">
                    <span style="font-weight:800;">${c.nome.toUpperCase()}</span>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-edit" onclick="prepararEdicao(${c.id})"><i class="fa-solid fa-pen-to-square"></i></button>
                        <button class="btn-delete" style="color:#ffb1c1" onclick="excluir(${c.id})"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                </div>
                <span class="price-tag">R$ ${saldo.toFixed(2)}</span>
                <div style="display:grid; grid-template-columns: 2fr 1fr 1.2fr; gap:5px;">
                    <input type="text" id="it-${c.id}" placeholder="Produto" oninput="atualizarPreco(this, ${c.id})">
                    <input type="number" id="qt-${c.id}" value="1">
                    <input type="number" id="vl-${c.id}" placeholder="R$">
                </div>
                <button class="btn-main" onclick="salvarVenda(${c.id})">ANOTAR PEDIDO</button>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:8px;">
                    <button class="btn-action" onclick="abrirHistorico(${c.id})">COBRAR</button>
                    <button class="btn-action" onclick="abrirResumoConta(${c.id})">RESUMO MÊS</button>
                </div>`;
            listaDiv.appendChild(card);
        });

        document.getElementById('totalHoje').innerText = `R$ ${totalH.toFixed(2)}`;
        document.getElementById('totalGeral').innerText = `R$ ${totalG.toFixed(2)}`;
    }

    window.abrirHistorico = (id) => {
        clienteAbertoId = id;
        const c = dbClientes.find(x => x.id === id);
        document.getElementById('nomeClienteModal').innerText = c.nome.toUpperCase();
        
        let totalPagos = Math.abs(c.compras.filter(i => i.valor_total < 0).reduce((acc, i) => acc + i.valor_total, 0));
        const compras = c.compras.filter(i => i.valor_total > 0).sort((a,b) => new Date(a.data) - new Date(b.data));
        
        itensPendentesGlobal = [];
        compras.forEach(item => {
            if (totalPagos >= item.valor_total) { totalPagos -= item.valor_total; }
            else { itensPendentesGlobal.push({...item, valor_exibir: item.valor_total - totalPagos}); totalPagos = 0; }
        });

        const listAbertos = document.getElementById('listaItensModal');
        listAbertos.innerHTML = '';
        itensPendentesGlobal.forEach(i => {
            listAbertos.innerHTML += `
                <label class="item-selecionavel">
                    <input type="checkbox" class="chk-item" data-valor="${i.valor_exibir}" onchange="atualizarSoma()">
                    <div style="flex:1; display:flex; justify-content:space-between;">
                        <span>${i.descricao} (${new Date(i.data).toLocaleDateString('pt-BR').substring(0,5)})</span>
                        <b>R$ ${i.valor_exibir.toFixed(2)}</b>
                    </div>
                </label>`;
        });
        document.getElementById('modalHistorico').style.display='block';
    };

    window.atualizarSoma = () => {
        let soma = 0;
        document.querySelectorAll('.chk-item:checked').forEach(cb => soma += parseFloat(cb.getAttribute('data-valor')));
        document.getElementById('txtSoma').innerText = `R$ ${soma.toFixed(2)}`;
        document.getElementById('containerSoma').style.display = soma > 0 ? 'block' : 'none';
    };

    window.abrirResumoConta = (id) => {
        const c = dbClientes.find(x => x.id === id);
        const mesAtual = new Date().getMonth();
        const anoAtual = new Date().getFullYear();
        
        document.getElementById('nomeClienteResumo').innerText = c.nome.toUpperCase();
        document.getElementById('dataHoraRecibo').innerText = `Gerado em: ${new Date().toLocaleString('pt-BR')}`;
        
        const corpo = document.getElementById('corpoExtrato');
        corpo.innerHTML = '<div style="display:grid; grid-template-columns: 50px 30px 1fr 70px; font-weight:bold; border-bottom:1px solid #000; padding-bottom:5px; font-size:10px;"><div>DATA</div><div>QTD</div><div>PRODUTO</div><div style="text-align:right">VALOR</div></div>';
        
        // Filtra apenas compras do mês atual
        const comprasMes = c.compras.filter(i => {
            const d = new Date(i.data);
            return i.valor_total > 0 && d.getMonth() === mesAtual && d.getFullYear() === anoAtual;
        });

        if(comprasMes.length === 0) {
            corpo.innerHTML += '<p style="text-align:center; padding:20px;">Nenhum pedido este mês.</p>';
        } else {
            let somaMes = 0;
            comprasMes.forEach(i => {
                somaMes += i.valor_total;
                corpo.innerHTML += `
                <div class="extrato-item">
                    <div>${new Date(i.data).toLocaleDateString('pt-BR').substring(0,5)}</div>
                    <div>${i.qtd}x</div>
                    <div>${i.descricao}</div>
                    <div style="text-align:right">R$ ${i.valor_total.toFixed(2)}</div>
                </div>`;
            });
            corpo.innerHTML += `<div style="text-align:right; font-weight:bold; padding-top:10px; font-size:14px;">TOTAL MÊS: R$ ${somaMes.toFixed(2)}</div>`;
        }
        
        document.getElementById('modalResumo').style.display = 'block';
    };

    async function enviarZapDoces(tipo) {
        const c = dbClientes.find(x => x.id === clienteAbertoId);
        const chave = document.getElementById('cfgChavePix').value;
        const titular = document.getElementById('cfgNomePix').value;

        // Salva configs de pix
        await _supabase.from('configuracoes').upsert({ id: 1, chave_pix: chave, nome_pix: titular });

        let msg = "";
        if(tipo === 'pix') {
            const total = itensPendentesGlobal.reduce((acc, i) => acc + i.valor_exibir, 0);
            msg = `Olá ${c.nome}! ✨\nPassando para enviar seu resumo de pedidos:\nTotal: *R$ ${total.toFixed(2)}*\n\n🔑 *Chave PIX:* ${chave}\n👤 *Titular:* ${titular}\n\nMuito obrigada! ❤️`;
        } else {
            let lista = itensPendentesGlobal.map(i => `▫️ ${i.descricao}: R$ ${i.valor_exibir.toFixed(2)}`).join('\n');
            msg = `Oi ${c.nome}! ✨ Segue seu consumo atual:\n\n${lista}\n\nQualquer dúvida estou aqui! 🍫`;
        }
        window.open(`https://wa.me/55${c.tel}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    window.processarPagamento = async (clienteId) => {
        let soma = 0;
        document.querySelectorAll('.chk-item:checked').forEach(cb => soma += parseFloat(cb.getAttribute('data-valor')));
        if (confirm(`Confirmar pagamento de R$ ${soma.toFixed(2)}?`)) {
            await _supabase.from('compras').insert([{ cliente_id: clienteId, descricao: "PAGAMENTO EFETUADO", valor_total: -soma }]);
            fecharModais();
            carregarDados();
        }
    };

    window.salvarVenda = async (id) => {
        const it = document.getElementById(`it-${id}`).value.toUpperCase() || "DOCE", 
              qt = parseInt(document.getElementById(`qt-${id}`).value) || 1, 
              vl = parseFloat(document.getElementById(`vl-${id}`).value);
        if(!vl) return alert("Insira o valor!");
        await _supabase.from('compras').insert([{ cliente_id: id, descricao: it, qtd: qt, valor_total: (qt * vl) }]);
        carregarDados();
    };

    document.getElementById('btnCadastrar').onclick = async () => {
        const nome = document.getElementById('novoNome').value, tel = document.getElementById('novoTel').value, 
              niver = document.getElementById('novoNiver').value, lim = document.getElementById('novoLimite').value;
        if(!nome || !tel) return alert("Nome e Tel são obrigatórios!");
        await _supabase.from('clientes').insert([{ nome, tel, aniversario: niver, limite: parseFloat(lim) }]);
        carregarDados();
    };

    document.getElementById('btnLogin').onclick = async () => {
        const { error } = await _supabase.auth.signInWithPassword({ email: document.getElementById('loginEmail').value, password: document.getElementById('loginPassword').value });
        if(error) alert("Erro: " + error.message); else checkUser();
    };

    function toggleTheme() {
        document.body.classList.toggle('dark-mode');
    }

    checkUser();
</script>
</body>
</html>
